name: CI Deterministic Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-deterministic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: backend-tests
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: cmd
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run backend tests
        run: gradlew.bat test --no-daemon

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: backend-test-artifacts
          path: |
            backend/build/reports/tests/**
            backend/build/test-results/**

  android-unit-tests:
    name: android-unit-tests
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: cmd
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Run Android unit tests
        run: gradlew.bat testDebugUnitTest --no-daemon

      - name: Upload Android unit test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-unit-test-artifacts
          path: |
            android/app/build/reports/tests/**
            android/app/build/test-results/**

  android-assemble-debug:
    name: android-assemble-debug
    runs-on: windows-latest
    timeout-minutes: 40
    needs: [android-unit-tests]
    defaults:
      run:
        shell: cmd
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Assemble Android debug build
        run: gradlew.bat assembleDebug --no-daemon

      - name: Upload Android debug assemble artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-assemble-debug-artifacts
          path: |
            android/app/build/outputs/apk/debug/**
            android/app/build/outputs/logs/**
