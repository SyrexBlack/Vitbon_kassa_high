name: CI Emulator Smoke

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-emulator-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-emulator-smoke:
    name: android-emulator-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator runtime dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpulse0

      - name: Run emulator smoke tests
        uses: ReactiveCircus/android-emulator-runner@70f4dee990796918b78d040e3278474bdbd348a7
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-boot-anim -no-window -gpu swiftshader_indirect -noaudio -camera-back none
          script: cd android && chmod +x ./gradlew && ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: emulator-smoke-androidtest-reports
          path: |
            android/app/build/reports/androidTests/**
            android/app/build/outputs/androidTest-results/**
            android/app/build/outputs/logs/**
